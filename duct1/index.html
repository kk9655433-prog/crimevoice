<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>螺絲拆解</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#081423;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.game-shell{
  width:min(94vw,560px);
  aspect-ratio:.66;
  background:linear-gradient(145deg,#dce3e8,#6e7b86);
  border-radius:20px;
  padding:12px;
}

.game-inner{
  width:100%;
  height:100%;
  border-radius:16px;
  background:#0f1b24;
  position:relative;
  overflow:hidden;
}

.title{position:absolute;top:12px;left:12px;color:#fff;font-weight:bold}
.sub{position:absolute;top:36px;left:12px;color:#9fb4c3;font-size:12px}

.top-ui{
  position:absolute;
  top:70px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.tray-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  width:90%;
}

.tray-card{
  height:60px;
  border-radius:16px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.slot{
  width:20px;height:20px;border-radius:50%;
  margin:3px;
  background:rgba(255,255,255,.2);
}

.buffer-row{
  display:flex;
  gap:8px;
}

.buffer-slot{
  width:20px;height:20px;border-radius:50%;
  background:rgba(255,255,255,.15);
}

.board{
  position:absolute;
  bottom:0;
  width:100%;
  height:70%;
  --scale:1;
}

.layer{
  position:absolute;
  inset:0;
  transform:scale(var(--scale));
  transform-origin:top center;
}

.plate{
  position:absolute;
  width:120px;height:100px;
  background:rgba(255,120,120,.7);
  border-radius:12px;
  transition:.6s;
}

.plate.drop{
  transform:translateY(200px);
  opacity:0;
}

.screw{
  width:28px;height:28px;border-radius:50%;
  position:absolute;
  cursor:pointer;
}

.vent{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:260px;height:120px;
  background:#333;
  border-radius:12px;
}

.escape-light{
  position:absolute;
  inset:0;
  background:white;
  opacity:0;
  transform:scale(.1);
  transition:3s;
}

.escape-light.show{
  opacity:1;
  transform:scale(10);
}

.modal{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.5);
}

.hidden{display:none}

.modal-card{
  background:#1c2a33;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:8px 20px;
}
</style>
</head>

<body>

<div class="game-shell">
<div class="game-inner">

<div class="title">螺絲拆解</div>
<div class="sub">拆掉板子上的螺絲，打開出口</div>

<div class="top-ui">
<div class="tray-grid" id="tray"></div>
<div class="buffer-row" id="buffer"></div>
</div>

<div class="board" id="board">
<div class="layer" id="layer"></div>
<div class="vent" id="vent"></div>
</div>

<div class="escape-light" id="light"></div>

<div class="modal" id="end">
<div class="modal-card">
<p>你終於見到了太陽……</p>
<button onclick="location.reload()">確定</button>
</div>
</div>

</div>
</div>

<script>
const colors=["red","orange","blue","purple","pink","yellow","gray"]

const COLOR_MAP={
red:"#ff3e3e",
orange:"#ff9a2b",
blue:"#54a8ff",
purple:"#9d4dff",
pink:"#ef86d2",
yellow:"#f1d441",
gray:"#aaa"
}

const layer=document.getElementById("layer")
const board=document.getElementById("board")
const light=document.getElementById("light")
const end=document.getElementById("end")

function scale(){
let w=window.innerWidth
let s=1
if(w<500)s=.7
else if(w<700)s=.85
board.style.setProperty("--scale",s)
}
window.onresize=scale
scale()

function randomColor(){return colors[Math.floor(Math.random()*colors.length)]}

let plates=[]

for(let i=0;i<12;i++){
let p=document.createElement("div")
p.className="plate"
p.style.left=Math.random()*200+"px"
p.style.top=Math.random()*200+"px"

for(let j=0;j<4;j++){
let s=document.createElement("div")
s.className="screw"
let c=randomColor()
s.style.background=COLOR_MAP[c]
s.style.left=(j%2?60:10)+"px"
s.style.top=(j<2?10:50)+"px"

s.onclick=()=>{
s.remove()
if(p.querySelectorAll(".screw").length===0){
p.classList.add("drop")
checkEnd()
}
}

p.appendChild(s)
}

layer.appendChild(p)
plates.push(p)
}

function checkEnd(){
let left=plates.filter(p=>!p.classList.contains("drop")).length
if(left===0){
setTimeout(()=>{
light.classList.add("show")
setTimeout(()=>{
end.classList.remove("hidden")
},3000)
},500)
}
}
</script>

</body>
</html>
